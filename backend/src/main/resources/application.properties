# App
spring.application.name=backend

# Database - Neon PostgreSQL
# Secrets come from environment variables (set them on Render / locally). The
# app will not start until DB_PASSWORD is provided.
spring.datasource.url=${DB_URL:jdbc:postgresql://ep-old-leaf-ai9oxcva.c-4.us-east-1.aws.neon.tech/neondb?sslmode=require}
spring.datasource.username=${DB_USERNAME:neondb_owner}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Email
# Submission port with STARTTLS rather than implicit SSL on 465: connections to
# 465 time out from our host, which stalls every OTP for the full connect
# timeout before failing. 587 is also what Gmail recommends.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:clearstock101@gmail.com}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=false
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# Fail fast instead of hanging: an unreachable mail server shouldn't hold a
# sign-up request open for minutes.
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# Paystack
paystack.secret.key=${PAYSTACK_SECRET_KEY}

# SMS (Arkesel) - set ARKESEL_API_KEY in the environment to enable real texts.
# Leave it unset and OTPs fall back to email / the on-screen code.
arkesel.api.key=${ARKESEL_API_KEY:}
arkesel.sender.id=${ARKESEL_SENDER_ID:ClearStock}
# Admin dashboard. The super admin is seeded on first boot from these; set them
# in the deployment environment, never in this file.
admin.super.email=${SUPER_ADMIN_EMAIL:}
admin.super.password=${SUPER_ADMIN_PASSWORD:}
admin.super.name=${SUPER_ADMIN_NAME:Super Admin}
# Set to true only to recover a forgotten super admin password, then remove it.
admin.super.reset=${SUPER_ADMIN_RESET:false}
# Browser origins allowed to call the API (comma-separated).
admin.cors.origins=${ADMIN_CORS_ORIGINS:http://localhost:5173}
