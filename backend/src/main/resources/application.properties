# App
spring.application.name=backend

# Database - Neon PostgreSQL
# Secrets come from environment variables (set them on Render / locally). The
# app will not start until DB_PASSWORD is provided.
spring.datasource.url=${DB_URL:jdbc:postgresql://ep-old-leaf-ai9oxcva.c-4.us-east-1.aws.neon.tech/neondb?sslmode=require}
spring.datasource.username=${DB_USERNAME:neondb_owner}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Email
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${MAIL_USERNAME:clearstock101@gmail.com}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.starttls.enable=false

# Paystack
paystack.secret.key=${PAYSTACK_SECRET_KEY}

# SMS (Arkesel) - set ARKESEL_API_KEY in the environment to enable real texts.
# Leave it unset and OTPs fall back to email / the on-screen code.
arkesel.api.key=${ARKESEL_API_KEY:}
arkesel.sender.id=${ARKESEL_SENDER_ID:ClearStock}
# Set ARKESEL_SANDBOX=true to validate the integration without sending or
# charging (Arkesel simulates the send). Leave false/unset for real delivery.
arkesel.sandbox=${ARKESEL_SANDBOX:false}